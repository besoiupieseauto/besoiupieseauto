<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecDoc AI Agent - Căutare Inteligentă</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #3498db; }
        button { width: 100%; padding: 15px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        #loading { display: none; text-align: center; margin-top: 20px; }
        #results { margin-top: 30px; }
        .loader { border: 4px dotted #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-box { background-color: #fee; border-left: 5px solid #e74c3c; padding: 15px; border-radius: 4px; color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 TecDoc AI Autopilot</h1>

    <div class="input-group">
        <label for="vin">Cod VIN Vehicul:</label>
        <input type="text" id="vin" placeholder="Ex: WDD1690311J..." value="WDD1690311J875947">
    </div>

    <div class="input-group">
        <label for="query">Ce piesă cauți?</label>
        <input type="text" id="query" placeholder="Ex: Bara fata, Placute frana..." value="Bara fata pentru Mercedes A-Class W169">
    </div>

    <button id="searchBtn">Caută Piesă prin AI</button>

    <div id="loading">
        <div class="loader"></div>
        <p>Agentul AI analizează catalogul TecDoc... Vă rugăm așteptați.</p>
    </div>

    <div id="results"></div>
</div>

<script>
    $(document).ready(function() {
        $('#searchBtn').on('click', function() {
            const vin = $('#vin').val();
            const query = $('#query').val();

            if(!vin || !query) {
                alert('Vă rugăm să completați ambele câmpuri!');
                return;
            }

            // Resetare interfață
            $('#results').html('');
            $('#loading').show();
            $('#searchBtn').attr('disabled', true).css('background', '#bdc3c7');

            $.ajax({
                url: 'process.php',
                type: 'POST',
                data: { vin: vin, cerere: query },
                success: function(response) {
                    $('#loading').hide();
                    $('#searchBtn').attr('disabled', false).css('background', '#3498db');
                    $('#results').html(response);
                },
                error: function() {
                    $('#loading').hide();
                    $('#searchBtn').attr('disabled', false).css('background', '#3498db');
                    $('#results').html('<div class="error-box">Eroare la comunicarea cu serverul. Verificați conexiunea.</div>');
                }
            });
        });
    });
</script>

</body>
</html>
